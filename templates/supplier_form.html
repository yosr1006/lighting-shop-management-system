{% extends "base.html" %}
{% block content %}

<h2>{% if mode == 'add' %}Add Supplier{% else %}Edit Supplier{% endif %}</h2>

<form method="POST" style="max-width:450px;">

    <label>Phone</label>
<input type="text" name="supplier_phone"
       value="{{ supplier.supplier_phone if supplier else '' }}"
       {% if mode == 'edit' %}readonly style="background:#f0f0f0; color:#888; cursor:not-allowed;"{% endif %}
       required>

<label>Name</label>
<input type="text" name="supplier_name"
       value="{{ supplier.supplier_name if supplier else '' }}"
       {% if mode == 'edit' %}readonly style="background:#f0f0f0; color:#888; cursor:not-allowed;"{% endif %}
       required>

    <label>Address</label>
    <input type="text" name="supplier_address"
           value="{{ supplier.supplier_address if supplier else '' }}"
           required>

    <br>
    <button type="submit" class="btn btn-success">
        {% if mode == 'add' %}Add Supplier{% else %}Save Changes{% endif %}
    </button>
    <a href="{{ url_for('suppliers') }}" class="btn" style="margin-left:10px;">Cancel</a>
</form>

{% endblock %}
